<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:; img-src 'self' data: blob:; connect-src 'self' data: blob: ws://localhost:* https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com">
    <title>The Office</title>
    <style>
      html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      .hide-scrollbar::-webkit-scrollbar { display: none; }

      /* Themed scrollbars — match the app palette (dark surface + slate). */
      *::-webkit-scrollbar { width: 10px; height: 10px; }
      *::-webkit-scrollbar-track { background: transparent; }
      *::-webkit-scrollbar-thumb {
        background-color: rgba(148, 163, 184, 0.18);
        border-radius: 5px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      *::-webkit-scrollbar-thumb:hover { background-color: rgba(148, 163, 184, 0.4); }
      *::-webkit-scrollbar-thumb:active { background-color: rgba(99, 102, 241, 0.55); }
      *::-webkit-scrollbar-corner { background: transparent; }
      * { scrollbar-color: rgba(148, 163, 184, 0.3) transparent; scrollbar-width: thin; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
