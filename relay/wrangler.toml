name = "the-office-relay"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
workers_dev = true

[durable_objects]
bindings = [
  { name = "SESSION_DO", class_name = "SessionDO" }
]

[[migrations]]
tag = "v1"
new_classes = ["SessionDO"]

[env.staging]
name = "the-office-relay-staging"
workers_dev = true

[env.production]
name = "the-office-relay"
workers_dev = true

# When a custom domain is configured later, add:
# routes = [{ pattern = "relay.example.com/*", zone_name = "example.com" }]
# and flip workers_dev to false.
