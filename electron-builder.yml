appId: com.shahar061.the-office
productName: The Office
copyright: Copyright © ${author}

directories:
  output: release
  buildResources: build

files:
  - dist/main/**/*
  - dist/preload/**/*
  - dist/renderer/**/*
  - package.json

asar: true

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  artifactName: ${productName}-${version}-${arch}.${ext}

publish:
  provider: github
  owner: shahar061
  repo: the-office
  releaseType: draft
