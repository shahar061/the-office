<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home — Habit Streak Tracker</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #FAF7F2; color: #2A2620; }
    .phone { max-width: 375px; margin: 40px auto; background: #FFFDF9; border: 1px solid #E6DFD2; border-radius: 24px; padding: 32px 24px; }
    h1 { font-size: 16px; font-weight: 500; color: #8B7D6B; margin: 0 0 8px; }
    .streak { font-size: 96px; font-weight: 300; color: #2A2620; line-height: 1; margin: 24px 0; text-align: center; }
    .streak-label { text-align: center; color: #8B7D6B; font-size: 14px; margin-bottom: 48px; }
    button { width: 100%; padding: 16px; background: #C87A4A; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; }
    button:disabled { background: #E6DFD2; color: #8B7D6B; }
  </style>
</head>
<body>
  <div class="phone">
    <h1>Morning meditation</h1>
    <div class="streak">12</div>
    <div class="streak-label">day streak</div>
    <button>Check in for today</button>
  </div>
</body>
</html>
