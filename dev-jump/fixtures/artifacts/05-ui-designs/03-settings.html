<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings — Habit Streak Tracker</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #FAF7F2; color: #2A2620; }
    .phone { max-width: 375px; margin: 40px auto; background: #FFFDF9; border: 1px solid #E6DFD2; border-radius: 24px; padding: 32px 24px; }
    h1 { font-size: 20px; margin: 0 0 24px; }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #E6DFD2; }
    .row:last-child { border-bottom: none; }
    .label { color: #2A2620; }
    .value { color: #8B7D6B; }
    .danger { color: #C04444; }
  </style>
</head>
<body>
  <div class="phone">
    <h1>Settings</h1>
    <div class="row"><span class="label">Habit name</span><span class="value">Morning meditation ›</span></div>
    <div class="row"><span class="label">Reminder time</span><span class="value">7:00 AM ›</span></div>
    <div class="row"><span class="label">Strict mode</span><span class="value">On ›</span></div>
    <div class="row"><span class="label danger">Reset streak</span></div>
  </div>
</body>
</html>
